<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직접PPA 전력거래대금 정산서 자동생성</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loginGate" class="login-gate">
  <div class="login-card">
    <img src="assets/logo.jpg" alt="한화 신한 테라와트아워" class="login-logo">
    <div class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
      <input type="text" id="loginId" placeholder="아이디" autocomplete="username">
      <div class="pw-field">
        <input type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
        <button type="button" id="pwToggleBtn" class="pw-toggle" aria-label="비밀번호 표시">👁</button>
      </div>
      <button class="btn accent" id="loginBtn">로그인</button>
      <span id="loginError" class="status bad" style="display:none;"></span>
    </div>
  </div>
</div>

<div id="appRoot" style="display:none;">

<header class="app">
  <div class="app-title">
    <h1>직접PPA 전력거래대금 정산 시스템</h1>
  </div>
  <div class="badge" id="monthBadge">정산월 미설정</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="tab1">1. 데이터 업로드</button>
  <button class="tab-btn" data-tab="tab2">2. 발전소별 확인/조정</button>
  <button class="tab-btn" data-tab="tab3">3. 정산서 생성/다운로드</button>
</nav>

<main>

  <!-- TAB 1 : UPLOAD -->
  <div class="panel active" id="tab1">
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-text">드래그해서 파일을 놓거나 클릭해서 선택하세요</div>
        <input type="file" id="dataFile" accept=".xlsx,.xls">
      </div>
      <div class="row" style="margin-top:10px;">
        <span id="dataStatus" class="status warn" style="display:none;"></span>
      </div>
      <div class="kpi-grid" id="siteKpis" style="display:none;"></div>
    </div>

    <div class="card" id="aggCard" style="display:none;">
      <h2>발전소별 집계 결과 (이번 달, 확인용)</h2>
      <div class="grid-wrap">
        <table class="grid" id="aggTable"></table>
      </div>
    </div>
  </div>

  <!-- TAB 2 : PER-PLANT CHECK & ADJUSTMENTS -->
  <div class="panel" id="tab2">
    <div class="card">
      <div class="row">
        <label style="font-size:12.5px; color:var(--sub);">발전사업자 선택</label>
        <select id="plantSelectAdjust" class="plant-select" onchange="onPlantSelectChange(this.value)"></select>
        <button class="btn secondary" id="refreshMasterBtn">마스터 정보 새로고침</button>
        <span id="refreshMasterStatus" class="status warn" style="background:none;"></span>
      </div>
    </div>

    <div class="card" id="plantAdjustHost" style="display:none;">
      <h2>발전소 월 집계</h2>
      <div class="kpi-grid" id="plantKpis"></div>

      <h2 style="margin-top:20px;">정산 조정값</h2>
      <div class="form-vertical">
        <label class="adj-label">전월 차액 (원)</label>
        <input type="number" id="adjPrevDiff" class="adj-input" value="0">
        <label class="adj-label">전월 미지급액 (원)</label>
        <input type="number" id="adjPrevUnpaid" class="adj-input" value="0">
        <label class="adj-label">기타정산 (원)</label>
        <input type="number" id="adjOtherSettle" class="adj-input" value="0">
        <button class="btn accent" id="adjSaveBtn">저장</button>
        <span id="adjStatus" class="status warn" style="background:none;"></span>
      </div>
    </div>
  </div>

  <!-- TAB 3 : INVOICE GENERATION -->
  <div class="panel" id="tab3">
    <div class="card">
      <div class="row">
        <label style="font-size:12.5px; color:var(--sub);">발전사업자 선택</label>
        <select id="plantSelectInvoice" class="plant-select" onchange="onPlantSelectChange(this.value)"></select>
      </div>
      <div class="action-grid">
        <button class="action-box" id="exportBtn" disabled>엑셀</button>
        <button class="action-box" id="pdfBtn" disabled>PDF</button>
        <button class="action-box" id="exportAllBtn" disabled>합본</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <span id="exportAllStatus" class="status warn" style="background:none;"></span>
      </div>
    </div>

    <div class="card doc-card" id="invoiceHost" style="display:none;"></div>
  </div>

</main>

</div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/upload.js"></script>
<script src="js/invoice.js"></script>
<script src="js/exporters/excel.js"></script>
<script src="js/exporters/pdf.js"></script>
<script src="js/exporters/zip.js"></script>
<script src="js/main.js"></script>
</body>
</html>
